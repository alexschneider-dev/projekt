version: "3.9"

services:
  nextjs:
    image: ghcr.io/alexschneider-dev/projekt:${PROJEKT_VERSION}

    env_file:
      - ./env/nextjs.env

    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"

    networks:
      - projekt_net

    volumes:
      - nextjs_cache:/app/.next/cache/images

    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://localhost:3000/
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

    deploy:
      replicas: 1
      endpoint_mode: dnsrr

      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s

      rollback_config:
        parallelism: 1
        order: start-first

      restart_policy:
        condition: any
        delay: 5s
        window: 30s

      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  nginx:
    image: ghcr.io/alexschneider-dev/nginx-projekt:${NGINX_VERSION}

    networks:
      - projekt_net

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host

      - target: 443
        published: 443
        protocol: tcp
        mode: host

    volumes:
      - nginx_cache:/var/cache/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    healthcheck:
      test:
        - CMD
        - /usr/sbin/nginx
        - -t
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      replicas: 1

      placement:
        constraints:
          - node.role == manager

      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback

      restart_policy:
        condition: any
        delay: 5s

      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  postgres:
    image: postgres:17

    env_file:
      - ./env/postgres.env

    networks:
      - projekt_net

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    deploy:
      replicas: 1
      endpoint_mode: dnsrr

      placement:
        constraints:
          - node.role == manager

      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback

      restart_policy:
        condition: any
        delay: 5s

      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M


  redis:
    image: redis:7-alpine

    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru

    networks:
      - projekt_net

    volumes:
      - redis_data:/data

    deploy:
      replicas: 1

      endpoint_mode: dnsrr

      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: any
        delay: 5s

      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  projekt_net:
    external: true

volumes:
  nextjs_cache:
    external: true

  nginx_cache:
    external: true

  postgres_data:
    external: true

  redis_data:
    external: true