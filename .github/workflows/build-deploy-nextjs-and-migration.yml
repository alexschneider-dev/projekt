name: Next.js bereitstellen und Datenbank migrieren

on:
  workflow_dispatch:
    inputs:
      version:
        description: "1.01"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: projekt-nextjs-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version prüfen
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -Eeuo pipefail

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Ungültige Version: $VERSION"
            exit 1
          fi

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Prisma Client generieren
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: TypeScript prüfen
        run: npm run typecheck


      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Migrations-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/migration/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/alexschneider-dev/projekt-migration:${{ inputs.version }}
            ghcr.io/alexschneider-dev/projekt-migration:${{ github.sha }}
          cache-from: type=gha,scope=projekt-migration
          cache-to: type=gha,mode=max,scope=projekt-migration

      - name: Next.js image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/alexschneider-dev/projekt:${{ inputs.version }}
            ghcr.io/alexschneider-dev/projekt:${{ github.sha }}
          cache-from: type=gha,scope=projekt-nextjs
          cache-to: type=gha,mode=max,scope=projekt-nextjs

