name: Build nginx image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "1.00"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: nginx-image-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nginx-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./services/nginx
          file: ./services/nginx/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/alexschneider-dev/nginx:${{ inputs.version }}
            ghcr.io/alexschneider-dev/nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx