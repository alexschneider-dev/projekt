add_header X-Rate-Limited $limit_req_status always;

limit_req_zone $binary_remote_addr zone=mylimit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=otp_zone:10m rate=1r/s;

real_ip_header X-Forwarded-For;
real_ip_recursive on;

set_real_ip_from 127.0.0.1;
set_real_ip_from 172.17.0.0/16;
set_real_ip_from 172.18.0.0/16;

proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=STATIC:10m
    inactive=7d
    max_size=30g
    use_temp_path=off;

proxy_cache_key "$scheme$request_method$server_name$request_uri";

open_file_cache max=10000 inactive=20s;
open_file_cache_valid 60s;
open_file_cache_min_uses 1;

upstream nextjs_upstream {
    zone nextjs_upstream 64k;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 2s;

    server tasks.nextjs:3000 resolve;
}

brotli on;
brotli_comp_level 5;
brotli_min_length 256;

brotli_types
    text/plain
    text/html
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    image/svg+xml;

gzip off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name alex-schneider-dev.de www.alex-schneider-dev.de;

    client_max_body_size 500M;
    client_body_buffer_size 20m;

    add_header Vary "Accept-Encoding" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
        allow all;
    }

    if ($http_user_agent ~* "(claudebot|seo|spider|AhrefsBot|amazon|bytespider|imagesiftbot|cohere-ai|diffbot|facebookbot|omgili|anthropic-ai|gptbot|chatgpt|ccbot|PetalBot)") {
        return 403;
    }

    location /api/ {
        limit_req zone=mylimit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Accept-Encoding "";

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie        $http_cookie;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /_next/image {
        limit_req zone=mylimit burst=1500;
        limit_req_status 429;

        proxy_cache STATIC;
        proxy_cache_valid 365d;
        proxy_cache_lock on;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Accept-Encoding "";

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_hide_header Cache-Control;
        proxy_ignore_headers Cache-Control;

        add_header X-Nextjs-Cache $upstream_http_x_nextjs_cache always;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^/_next/static/.*\.(js|css|woff2)$ {
        limit_req zone=mylimit burst=2000;
        limit_req_status 429;

        proxy_cache STATIC;
        proxy_cache_valid 365d;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Accept-Encoding "";

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location /_next/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Accept-Encoding "";

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location / {
        limit_req zone=mylimit burst=300 nodelay;
        limit_req_status 429;

        proxy_buffering on;

        proxy_cache STATIC;
        proxy_cache_valid 1m;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_lock_age 10s;
        proxy_cache_use_stale updating;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Accept-Encoding "";

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_set_header Cookie        "";
        proxy_set_header Authorization "";

        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_ignore_headers Cache-Control;

        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key "$scheme$server_name$request_uri" always;
    }
}