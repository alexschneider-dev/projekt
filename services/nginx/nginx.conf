include /etc/nginx/modules/*.conf;

user  nginx;

worker_processes auto;
events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


http {
    aio             threads;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr realip=$realip_remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" xff="$http_x_forwarded_for" '
                    'lr=$limit_req_status rt=$request_time ut=$upstream_response_time cs=$upstream_cache_status';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;

    keepalive_timeout 30s;
    keepalive_requests 1000;

    include /etc/nginx/conf.d/*.conf;
}
