add_header X-Rate-Limited $limit_req_status always;

limit_req_zone $binary_remote_addr zone=mylimit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=otp_zone:10m rate=1r/s;


real_ip_header X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from 127.0.0.1;       
set_real_ip_from 172.17.0.0/16;
set_real_ip_from 172.18.0.0/16; 

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d max_size=30g use_temp_path=off;

proxy_cache_key "$scheme$request_method$host$request_uri";

open_file_cache max=10000 inactive=20s;
open_file_cache_valid 60s;
open_file_cache_min_uses 1;

upstream nextjs_upstream {
    server nextjs-projekt:3000; 
}

gzip on;
gzip_types
  text/plain
  text/html
  text/css
  application/json
  application/javascript
  text/xml
  application/xml
  application/xml+rss
  text/javascript
  image/svg+xml;
gzip_min_length 256;
gzip_vary on;
gzip_proxied any;

map $upstream_http_x_nextjs_cache $bypass_cache {
    default 0;
    "MISS"  1;
}


server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name localhost;

    ssl_certificate /etc/nginx/fullchain.pem;
    ssl_certificate_key /etc/nginx/privkey.pem;
  
    client_max_body_size 500M;
    client_body_buffer_size 20m;

    keepalive_timeout 65;
    keepalive_requests 100;

    location /_next/webpack-hmr {
        proxy_pass http://nextjs-projekt:3000/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/image {
        proxy_cache STATIC;
        proxy_cache_valid 365d;
        proxy_pass http://nextjs_upstream;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000" always;
    }

    location /_next/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
        proxy_set_header Host $host;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /api/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";  
        proxy_set_header Host $host;

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
        proxy_set_header Host $host;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    location / {
        return 301 https://localhost$request_uri;
    }
}